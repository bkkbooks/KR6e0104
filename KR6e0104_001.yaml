body:
  text: 平江府普慈寺釋宗豫述注華嚴法界觀科二初序引二初題目二初所述序題注華二能述人號綿州二序文五初明真理三初標指直釋法界二翻顯難思無有三示唯智境非徹二顯至教四初違真趣妄甚矣二傷迷説教故世三顯教利益令一四讚教圓滿故此三示觀門三初歎教顯意然此二正示述作於是三結顯功能使其四彰注解三初歎教顯意然此二正示述作於是三結顯功能使人五顯問答四初約旨對詮二初問或問二答五初據法演教答曰二正示深廣二初通示廣深故凡二別顯遍容故佛三證法解脫證此四傷已迷倒由是五結未為廣然則二約經對觀二初正明經觀二初問問曰二答三初喻經觀相資答曰二辨五法差別二初備列五法故法二正分力用故欲三結廣略有在夫如二別示三重二初徵起然則二申明三初真空絶相二初約迷答曰二示觀於是二理事無礙二初約迷菩薩二示觀於是三周遍含容二初約迷菩薩二示觀於是三約昔對注二初問問曰二答二初正答所問二初不須廣解二初直造觀門三初別示觀門答曰二明設門意初心三宜直鑒法但塵二廣解無益三初重煩無益若別二反翳真趣又此三意非傍通且首二必藉略注三初正明注意然不二簡備合宜故其三總結大意夫觀二躡迹會通二初恐心難入問曰二遇師佛必注問曰四疑盡歎仰感者二觀文二觀文二初題目四初所注名題注法二能注人號圭峯三所述觀題六初通明修義止觀二所依經名三初通分能所所依二別釋文義大者三示略所以略無三所觀法界二初總明一真清涼二別分四義然心四能觀觀心情盡五能詮觀門此八六釋有三重三初正明除事除事二分四所以若分三別明重字此三四能述人號三初正迹示本姓杜二約其師承是華三別釋集字此是二本文二初分門真空二隨釋三初真空絶相二初標章列名第一二隨門別釋四初會色歸空觀二初總標注二初總分四門前三二別示前三三初正明所揀三初斷空前三二實色四初正明二簡二牒顯言實三出因約情四會通然此三雙揀三雙二重明文義據義三揀去亂意寶性二別示二初揀情三初斷空四初標一二徵何三釋二初釋上句注二初明所計執四初通明釋上二別顯此有三結成今揀四引證故中二會能計人二初正明然外二引證故肇二釋下句注四初推法本起釋下二定歸真空故今三揀非斷滅不合四指文所據所言四結二初結釋良二結標是二實色四初標二二徵何三釋二初釋上句注二初所揀因由釋上二揀定所為此揀二釋下句注四初示要釋文空無二影略通難然前三破色顯空二初總標空有二別示三初無邊義二初縱一無二奪空既二無壞義四初躡前起後二無二縱奪正破謂若三託喻反救救曰四就理奪破破曰三無雜義二初躡前起計三無二以理推破三初以空容色雜亂破破曰二不雜俱存非理破若言三色空周遍相違破二初通標相違若言二別示行相何者四結會觀旨故上四結良以三雙揀二初釋當句四初標三二徵何三釋二初釋上句以空二釋下句會色四結二初結釋良由二結標是故二結前三上三二顯理二初正顯色空四初標四二徵何三釋凡四結是二結例諸法三初約色因由色是二舉要例法舉要三正例觀旨應云二明空即色觀二初總標注四初會前科節揀情二正示今文但文三引經證成當般四別議第三唯第二別示二初揀情三初斷空四初標一二徵何三釋二初釋上句斷空二釋下句真空四結要二實色四初標二二徵何三釋二初釋上句以空二釋下句然不四結要三雙揀二初釋此句四初標三二徵何三釋二初釋上句空二釋下句二初正釋此文釋下二對前示意二初正明因由此不二別示文理有理四結良二結上三句上三二顯解二初正顯四初標四空二徵何故三釋凡是四結是故二結例如空三空色無礙觀三初總標觀名第三二別示無礙注三初科節色空二示意謂若三議文有本三約人結顯是故四泯絶無寄觀二初標二釋二初分科示意二初科節本文文二二總示注意初中二隨釋本文二初正釋此觀二初釋相五初拂第二門謂此二拂第一門亦不三通拂結例一切四拂今能拂不可五總遮結示此語二徵釋何以二總辨四句二初正分解行注五初節釋觀文各前二離謗絶非又初三示教分齊已當四配合心經又初五揀會三觀三初一往配合又乍二細詳不應細詳三據後對揀若此二反顯相資若不二理事無礙三周遍含容二理事無礙觀三初總標二初標名理事二標意但理注四初略會下門對二約境明觀具此三約觀顯行觀事四會通教門已當二別釋二初標科分次下二別顯示五初相遍四初正釋二初理遍事門四初示理事相一理二正明遍相一一三徵釋因由何以四舉塵結示是故二事遍理門四初示理事相二事二正明遍相此有三徵釋因由何以四舉塵結例是故二歎深二初歎超情注三初事遍一塵二理遍真理三議本有本二歎難喻注二初引經經曰二揀喻此因三喻指二初分科示意此下二正明喻指三初大小無礙如全二一異無礙同時三諸法全遍又大四問答二初科分此下二問答二初對初二喻二初問三初約理望事問理二約事望理一塵三總結相違既成二答二初總示答意答曰二別約四句二初理望事先理二事望理次事二對後一喻二初問問無二答二初總示答意答以二別約四句二初理望事先就二事望理次就二相成二初依理成事二初標名示義三依二寄喻合法如波二事能顯理二初標名示義四事二寄喻合法猶如三相害二初以理奪事二初約法五以二約喻如水二事能隱理三初約法示意六事二寄喻發明如水三引經為證經云四相即二初理即事二初約法七真二約喻如水二事即理二初約法八事二約喻如波五相非二初理非事二初約法九真二約喻如即二事非理二初約法十事二約喻如全三結勸二初結束二初結同緣起此上二別會諸緣約理注三初注釋諸門義相三也二別釋成境隱顯又事三不會初二所以不會二勸修深思三周遍含容觀三初標周遍二釋十初理如事三初標舉觀名注二初釋所標由此二異會本有本二顯示觀旨四初正釋不待二喻顯亦如三法合今理四揀異不同三舉人證成是故二事如理二初標二事二釋四三事含理事二三結勸令圓初且釋本文通論初約因標宗三事二指一為例如一三正例諸法如一
